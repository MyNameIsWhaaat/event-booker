version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: eventbooker-postgres
    env_file:
      - .env
    ports: ["5433:5432"]
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U eventbooker -d eventbooker"]
      interval: 5s
      timeout: 3s
      retries: 20

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: eventbooker-api
    command: ["/app/api"]
    env_file:
      - .env
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    volumes:
      - appdata:/data

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: eventbooker-worker
    command: ["/app/worker"]
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      mailhog:
        condition: service_started
    restart: unless-stopped
    volumes:
      - appdata:/data

  migrate:
    image: migrate/migrate:v4.17.1
    container_name: eventbooker-migrate
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./migrations:/migrations:ro
    command:
      - "-path=/migrations"
      - "-database=${DATABASE_URL}"
      - "up"
    restart: "no"
  mailhog:
    image: mailhog/mailhog
    container_name: eventbooker-mailhog
    ports:
    - "8025:8025"
    - "1025:1025"
    restart: unless-stopped

volumes:
  pgdata:
  appdata: