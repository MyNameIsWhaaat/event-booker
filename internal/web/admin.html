<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Admin</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <h1>Admin Panel</h1>

  <h2>Create Event</h2>

  <form id="createForm">
    <input placeholder="Title" id="title">
    <input placeholder="Starts (RFC3339)" id="starts">
    <input placeholder="Capacity" id="capacity">
    <input placeholder="TTL seconds" id="ttl">

    <label>
      Requires payment
      <input type="checkbox" id="payment" checked>
    </label>

    <button type="submit">Create</button>
  </form>

  <div id="message"></div>

  <h2>Events</h2>

  <table id="events">
    <thead>
      <tr>
        <th>Title</th>
        <th>Starts</th>
        <th>Capacity</th>
        <th>Pending</th>
        <th>Confirmed</th>
        <th>Free</th>
        <th>Bookings</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>

  <script src="admin.js"></script>
</body>
</html>
